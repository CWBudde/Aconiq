name: Go CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Verify formatting (gofmt)
        run: scripts/check-gofmt.sh

      - name: Go vet
        working-directory: backend
        run: go vet ./...

      - name: Go tests
        working-directory: backend
        run: go test ./...
