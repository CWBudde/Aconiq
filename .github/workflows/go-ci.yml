name: Go CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=2m
          skip-cache: false

      - name: Install formatters
        run: |
          go install mvdan.cc/gofumpt@latest
          go install github.com/daixiang0/gci@latest

      - name: Check formatting
        run: just check-formatted

      - name: Go vet
        working-directory: backend
        run: go vet ./...

      - name: Go tests
        run: just test

      - name: Check tidy
        run: just check-tidy

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check dependency licenses
        run: just license-check

      - name: Generate license report
        run: just license-report > license-report.csv

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.csv
          retention-days: 30

      - name: Build CLI
        run: just build

      - name: Generate OpenAPI spec
        run: bin/noise openapi --out docs/api/openapi.v1.json --server-url http://127.0.0.1:8080

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/api/openapi.v1.json
          retention-days: 30
