<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AconiQ</title>
    <script>
      // Redirect SPA routes to index.html via query string.
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.host +
          l.pathname.split("/").slice(0, 2).join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(1)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
